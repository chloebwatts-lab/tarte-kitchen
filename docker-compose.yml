services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: tarte
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: tarte_kitchen
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tarte -d tarte_kitchen"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME}
        NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: ${NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tarte:${DB_PASSWORD}@db:5432/tarte_kitchen
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://${DOMAIN}
      # Council inspection folder password (/council/login). Read at runtime by
      # council-auth.ts — throws & 500s every /council route if unset.
      COUNCIL_PASSWORD: ${COUNCIL_PASSWORD}
      # Secrets used at runtime — sourced from the droplet's .env via docker compose
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      CRON_SECRET: ${CRON_SECRET}
      # Gmail OAuth + invoice parsing
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
      GMAIL_REDIRECT_URI: ${GMAIL_REDIRECT_URI}
      # GBP OAuth (tarte-seo-engine project — quota-approved for My Business API)
      GBP_CLIENT_ID: ${GBP_CLIENT_ID}
      GBP_CLIENT_SECRET: ${GBP_CLIENT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Google Places API (server-side; IP-restricted to this droplet)
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      # Sensitive weekly digest recipient — chloe@ only, never accounts@.
      WEEKLY_DIGEST_RECIPIENT: ${WEEKLY_DIGEST_RECIPIENT:-chloe@tarte.com.au}
      REVIEW_SUMMARY_RECIPIENT: ${REVIEW_SUMMARY_RECIPIENT:-chloe@tarte.com.au}
      # Sheets wastage ingest
      WASTAGE_SHEET_ID: ${WASTAGE_SHEET_ID}
      # Xero (accounting / labour)
      XERO_CLIENT_ID: ${XERO_CLIENT_ID}
      XERO_CLIENT_SECRET: ${XERO_CLIENT_SECRET}
      XERO_REDIRECT_URI: ${XERO_REDIRECT_URI}
      # Lightspeed POS (optional, currently unused for OAuth in prod)
      LIGHTSPEED_CLIENT_ID: ${LIGHTSPEED_CLIENT_ID:-}
      LIGHTSPEED_CLIENT_SECRET: ${LIGHTSPEED_CLIENT_SECRET:-}
      LIGHTSPEED_REDIRECT_URI: ${LIGHTSPEED_REDIRECT_URI:-}
      # Deputy (labour timesheets)
      DEPUTY_CLIENT_ID: ${DEPUTY_CLIENT_ID:-}
      DEPUTY_CLIENT_SECRET: ${DEPUTY_CLIENT_SECRET:-}
      DEPUTY_REDIRECT_URI: ${DEPUTY_REDIRECT_URI:-}
      DEPUTY_INSTALL: ${DEPUTY_INSTALL:-}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # Persist downloaded supplier-invoice PDFs across deploys so the
      # Suppliers page can re-open them later. The check-invoices cron
      # mkdir's per-supplier subdirs here, so it must be writable by uid
      # 1001 (the nextjs user from Dockerfile).
      - invoice_pdfs:/app/data

  migrate:
    build:
      context: .
      target: builder
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tarte:${DB_PASSWORD}@db:5432/tarte_kitchen
    command: npx prisma migrate deploy
    profiles:
      - tools

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH}
      SHAWNA_AUTH_HASH: ${SHAWNA_AUTH_HASH}

  # Simple cron sidecar — fires the app's /api/cron/* endpoints on a daily
  # schedule. Runs inside the docker network so it can reach `app:3000`
  # directly; authenticates via CRON_SECRET. Times are in UTC.
  cron:
    image: alpine:3.19
    restart: unless-stopped
    depends_on:
      - app
    environment:
      CRON_SECRET: ${CRON_SECRET}
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl tzdata >/dev/null
        cat > /etc/crontabs/root <<'CRON'
        # 08:00 AEST — pull Lightspeed end-of-day email(s) from Gmail
        0 22 * * * curl -fsS -m 600 -H "Authorization: Bearer $$CRON_SECRET" http://app:3000/api/cron/sync-lightspeed-reports 2>&1
        # Every 2 hours — incremental supplier-invoice scan (Gmail after:
        # lastScanAt). Was once-daily — bumped 2026-05-22 so a stale
        # watermark or rate-limit hiccup can't cost us a whole day.
        0 */2 * * * curl -fsS -m 600 -H "Authorization: Bearer $$CRON_SECRET" http://app:3000/api/cron/check-invoices 2>&1
        # 09:00 AEST — nightly 14-day sweep that trusts gmailMessageId
        # dedupe. Safety net against watermark drift / silent skips —
        # the May 2026 incident that lost 30+ invoices over 4 days
        # would have been caught here next morning.
        0 23 * * * curl -fsS -m 600 -H "Authorization: Bearer $$CRON_SECRET" 'http://app:3000/api/cron/check-invoices?mode=sweep' 2>&1
        # Every 30 min — Lightspeed API sales sync for today + yesterday
        # (?days=2). Keeps the live FOH tracker's revenue side current.
        # Email source still wins for yesterday once it lands. Cheap: a
        # couple of API calls per venue per sync.
        */30 * * * * curl -fsS -m 600 -H "Authorization: Bearer $$CRON_SECRET" 'http://app:3000/api/cron/sync-sales?days=2' 2>&1
        # Every 15 min — pull Deputy rosters so /labour stays fresh
        */15 * * * * curl -fsS -m 600 -H "Authorization: Bearer $$CRON_SECRET" http://app:3000/api/cron/sync-deputy 2>&1
        # 09:30 AEST (23:30 UTC) — retry unmatched invoice lines against
        # newly added ingredients/mappings, after the 09:00 sweep and
        # before the 10:00 alert recompute so fresh matches feed it.
        30 23 * * * curl -fsS -m 600 -H "Authorization: Bearer $$CRON_SECRET" http://app:3000/api/cron/rematch-invoices 2>&1
        # 10:00 AEST (00:00 UTC) — recompute v2 price alerts, after the
        # 09:00 invoice sweep. Idempotent full recompute; auto-closes
        # alerts that stopped firing.
        0 0 * * * curl -fsS -m 600 -H "Authorization: Bearer $$CRON_SECRET" http://app:3000/api/cron/compute-price-alerts 2>&1
        # PAUSED 2026-05-15 per Chloe: too much email noise. Checklist /
        # temp-log status stays visible on the dashboard (DashboardOpsPanel)
        # and will be folded into the Friday weekly digest. To re-enable,
        # uncomment both lines and restart the cron container.
        # Every 15 min — overdue checklist alerts to chloe@ + shawna@
        # */15 * * * * curl -fsS -m 60 -H "Authorization: Bearer $$CRON_SECRET" http://app:3000/api/cron/checklist-alerts 2>&1
        # 18:00 AEST (08:00 UTC) — daily checklist summary to chloe@
        # 0 8 * * * curl -fsS -m 60 -H "Authorization: Bearer $$CRON_SECRET" http://app:3000/api/cron/daily-checklist-summary 2>&1
        # 08:00 AEST (22:00 UTC) — pull Google reviews, Claude-tag, draft
        # replies + email Chloe once per day. Was hourly back when Places
        # API capped each fetch at 5 reviews/venue — but GBP returns ALL
        # reviews paginated, so daily covers everything without flooding
        # Chloe's inbox with several draft batches per day.
        0 22 * * * curl -fsS -m 600 -H "Authorization: Bearer $$CRON_SECRET" http://app:3000/api/cron/sync-reviews 2>&1
        # Friday 08:00 AEST (22:00 UTC Thu) — unified weekly business digest
        # (reviews + sales + wages + COGS + wastage + supplier price spikes
        # + top sellers) → emailed to chloe@. See tarte_friday_digest.md memory.
        0 22 * * 4 curl -fsS -m 600 -H "Authorization: Bearer $$CRON_SECRET" http://app:3000/api/cron/weekly-digest 2>&1
        # Sunday 08:30 AEST (22:30 UTC Sat) — "how much left to spend this
        # week" per venue → emailed to chloe@. Moved from Sun 17:00 per
        # Chris 2026-07-14 (wants it Sunday morning); 08:30 sits after the
        # 08:00 Lightspeed EOD import so Saturday's takings are included.
        # Renders straight off the live /spend snapshot (no LLM).
        30 22 * * 6 curl -fsS -m 300 -H "Authorization: Bearer $$CRON_SECRET" http://app:3000/api/cron/weekly-spend-email 2>&1
        # Thursday 07:00 AEST (21:00 UTC Wed) — auto-pull Louise's "Reports"
        # email from accounts@ Gmail (3 PDFs + 2 xlsx) into LabourWeekActual
        # + WeeklyCogs, so Friday's digest has the actuals without Chloe
        # having to upload Thursday afternoon. Failure / partial → email
        # chloe@ with a link to /labour/upload for manual recovery.
        0 21 * * 3 curl -fsS -m 600 -H "Authorization: Bearer $$CRON_SECRET" http://app:3000/api/cron/pull-louise-reports 2>&1
        CRON
        exec crond -f -l 8 -L /dev/stdout

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  invoice_pdfs:
