services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: tarte
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: tarte_kitchen
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tarte -d tarte_kitchen"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME}
        NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: ${NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tarte:${DB_PASSWORD}@db:5432/tarte_kitchen
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://${DOMAIN}
      # Secrets used at runtime — sourced from the droplet's .env via docker compose
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      CRON_SECRET: ${CRON_SECRET}
      # Gmail OAuth + invoice parsing
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
      GMAIL_REDIRECT_URI: ${GMAIL_REDIRECT_URI}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Sheets wastage ingest
      WASTAGE_SHEET_ID: ${WASTAGE_SHEET_ID}
      # Xero (accounting / labour)
      XERO_CLIENT_ID: ${XERO_CLIENT_ID}
      XERO_CLIENT_SECRET: ${XERO_CLIENT_SECRET}
      XERO_REDIRECT_URI: ${XERO_REDIRECT_URI}
      # Lightspeed POS (optional, currently unused for OAuth in prod)
      LIGHTSPEED_CLIENT_ID: ${LIGHTSPEED_CLIENT_ID:-}
      LIGHTSPEED_CLIENT_SECRET: ${LIGHTSPEED_CLIENT_SECRET:-}
      LIGHTSPEED_REDIRECT_URI: ${LIGHTSPEED_REDIRECT_URI:-}
      # Deputy (labour timesheets)
      DEPUTY_CLIENT_ID: ${DEPUTY_CLIENT_ID:-}
      DEPUTY_CLIENT_SECRET: ${DEPUTY_CLIENT_SECRET:-}
      DEPUTY_REDIRECT_URI: ${DEPUTY_REDIRECT_URI:-}
      DEPUTY_INSTALL: ${DEPUTY_INSTALL:-}
    ports:
      - "127.0.0.1:3000:3000"

  migrate:
    build:
      context: .
      target: builder
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tarte:${DB_PASSWORD}@db:5432/tarte_kitchen
    command: npx prisma migrate deploy
    profiles:
      - tools

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH}

  # Simple cron sidecar — fires the app's /api/cron/* endpoints on a daily
  # schedule. Runs inside the docker network so it can reach `app:3000`
  # directly; authenticates via CRON_SECRET. Times are in UTC.
  cron:
    image: alpine:3.19
    restart: unless-stopped
    depends_on:
      - app
    environment:
      CRON_SECRET: ${CRON_SECRET}
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl tzdata >/dev/null
        cat > /etc/crontabs/root <<'CRON'
        # 08:00 AEST — pull Lightspeed end-of-day email(s) from Gmail
        0 22 * * * curl -fsS -m 600 -H "Authorization: Bearer $$CRON_SECRET" http://app:3000/api/cron/sync-lightspeed-reports 2>&1
        # 08:30 AEST — scan Gmail for new supplier invoices
        30 22 * * * curl -fsS -m 600 -H "Authorization: Bearer $$CRON_SECRET" http://app:3000/api/cron/check-invoices 2>&1
        # 06:30 AEST — API-based sales fallback (runs before the email cron;
        # email data overwrites if it arrives later)
        30 20 * * * curl -fsS -m 600 -H "Authorization: Bearer $$CRON_SECRET" http://app:3000/api/cron/sync-sales 2>&1
        # Every 15 min — pull Deputy rosters so /labour stays fresh
        */15 * * * * curl -fsS -m 600 -H "Authorization: Bearer $$CRON_SECRET" http://app:3000/api/cron/sync-deputy 2>&1
        CRON
        exec crond -f -l 8 -L /dev/stdout

volumes:
  pgdata:
  caddy_data:
  caddy_config:
